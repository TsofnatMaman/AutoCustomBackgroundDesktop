name: Auto-Update Branch Config

on:
  create:
    types: [branch]
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      branch_name:
        description: 'Branch name (leave empty for current)'
        required: false
        default: ''

jobs:
  update-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update config files
        run: |
          # Extract repo info
          GITHUB_USER=$(echo "$GITHUB_REPOSITORY" | cut -d'/' -f1)
          REPO_NAME=$(echo "$GITHUB_REPOSITORY" | cut -d'/' -f2)
          BRANCH_NAME="${{ inputs.branch_name }}"
          
          # If no branch provided, use current ref
          if [ -z "$BRANCH_NAME" ]; then
            BRANCH_NAME="${GITHUB_REF#refs/heads/}"
          fi
          
          # Update config.json
          sed -i "s/\"username\": \"[^\"]*\"/\"username\": \"$GITHUB_USER\"/g" Src/config.json
          sed -i "s/\"repository\": \"[^\"]*\"/\"repository\": \"$REPO_NAME\"/g" Src/config.json
          sed -i "s/\"branch\": \"[^\"]*\"/\"branch\": \"$BRANCH_NAME\"/g" Src/config.json
          
          # Update install.ps1
          sed -i "s/\\\$githubUsername = \"[^\"]*\"/\\\$githubUsername = \"$GITHUB_USER\"/g" Src/install.ps1
          sed -i "s/\\\$githubRepoName = \"[^\"]*\"/\\\$githubRepoName = \"$REPO_NAME\"/g" Src/install.ps1
          sed -i "s/\\\$githubBranchName = \"[^\"]*\"/\\\$githubBranchName = \"$BRANCH_NAME\"/g" Src/install.ps1

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          if git diff --quiet; then
            echo "No changes"
          else
            git add Src/config.json Src/install.ps1
            git commit -m "chore: update branch config [skip ci]"
            git push
          fi
